# Realistic small job: fine-tune Qwen2.5-0.5B with LoRA on your own text file.
# Fits comfortably in 4GB VRAM. Point `dataset` at any .txt or .jsonl
# (jsonl rows need a "text" field, or set text_field).
model: Qwen/Qwen2.5-0.5B
dataset: data/my_corpus.txt
seq_len: 512
batch_size: 4          # lower to 2 on 4GB cards if you hit out-of-memory
grad_accum: 2
lr: 2.0e-4
steps: 400
inner_steps: 100       # sync unit once this job runs across a pool
lora_r: 16
lora_alpha: 32
output_dir: checkpoints/qwen-lora
